<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Connect WhatsApp - Sodah</title>
  <link rel="stylesheet" href="../assets/css/connect-whatsapp.css" />
</head>
<body>
  <div class="container">
    <h1>Connect Your WhatsApp</h1>
    <p class="subtitle">
      Scan the QR code below using WhatsApp on your phone.
    </p>

    <div class="card">
      <button id="generateBtn">Generate QR Code</button>

      <div id="status">Ready to generate QR code.</div>

      <div id="qrContainer">
        <img id="qrImage" src="" alt="WhatsApp QR Code" />
      </div>
    </div>
  </div>

  <script src="../assets/css/js/connect-whatsapp.js"></script>
</body>
</html>
